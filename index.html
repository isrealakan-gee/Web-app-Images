<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HikeHER Onboarding Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
@import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");

@tailwind base;
@tailwind components;
@tailwind utilities;

@layer base {
  :root {
    /* ── Brand Palette ─────────────────────────────────────────
       #9E2DC0  Primary             → 286 62% 47%
       #7D2399  Primary hover       → 286 63% 37%
       #C382D6  Primary light       → 286 50% 68%
       #EDE1EE  Main background     → 292 19% 91%
       #FFFFFF  Card background     → 0 0% 100%
       #F6F1F8  Alt section bg      → 285 18% 96%
       #FF40B5  Accent / hot pink   → 323 100% 63%
       #E6571C  CTA orange          → 18 79% 51%
       #FFD9F3  Soft accent bg      → 316 100% 92%
       #FFE1D6  Soft CTA bg         → 18 100% 93%
       #2A2A2A  Primary text        → 0 0% 16%
       #6B6B6B  Secondary text      → 0 0% 42%
       #9A9A9A  Muted text          → 0 0% 60%
       #E3D9E6  Borders             → 290 16% 87%
       #28C76F  Success             → 147 66% 47%
       #FF9F43  Warning             → 29 100% 63%
       #EA5455  Error               → 0 76% 62%
       #00CFE8  Info                → 186 100% 46%
    ─────────────────────────────────────────────────────────── */

    --background:          292 19% 91%;
    --foreground:          0 0% 16%;

    --muted:               285 18% 96%;
    --muted-foreground:    0 0% 42%;

    --popover:             0 0% 100%;
    --popover-foreground:  0 0% 16%;

    --border:              290 16% 87%;
    --input:               290 16% 87%;

    --card:                0 0% 100%;
    --card-foreground:     0 0% 16%;

    --primary:             286 62% 47%;
    --primary-foreground:  0 0% 100%;

    --secondary:           285 18% 96%;
    --secondary-foreground: 0 0% 16%;

    --accent:              323 100% 63%;
    --accent-foreground:   0 0% 100%;

    /* CTA orange — use as a utility via bg-[hsl(var(--cta))] */
    --cta:                 18 79% 51%;
    --cta-foreground:      0 0% 100%;

    --destructive:         0 76% 62%;
    --destructive-foreground: 0 0% 100%;

    --ring:                286 62% 47%;
    --radius:              0.75rem;

    /* ── Semantic extras ── */
    --success:             147 66% 47%;
    --warning:             29 100% 63%;
    --info:                186 100% 46%;

    /* Soft tinted backgrounds */
    --soft-accent-bg:      316 100% 92%;
    --soft-cta-bg:         18 100% 93%;

    /* ── Charts ── */
    --chart-1:             286 62% 47%;
    --chart-2:             323 100% 63%;
    --chart-3:             18 79% 51%;
    --chart-4:             147 66% 47%;
    --chart-5:             186 100% 46%;

    /* ── Sidebar (deep brand purple) ── */
    --sidebar-background:         286 65% 17%;
    --sidebar-foreground:         285 18% 92%;
    --sidebar-primary:            286 50% 68%;
    --sidebar-primary-foreground: 0 0% 100%;
    --sidebar-accent:             286 55% 27%;
    --sidebar-accent-foreground:  285 18% 96%;
    --sidebar-border:             286 50% 23%;
    --sidebar-ring:               286 62% 47%;

    /* ── Typography ── */
    --font-sans: 'Inter', 'Helvetica Neue', sans-serif;
    --font-mono: 'Courier New', monospace;

    /* ── Shadows (brand-tinted) ── */
    --shadow-x:       0px;
    --shadow-y:       1px;
    --shadow-blur:    4px;
    --shadow-spread:  0px;
    --shadow-opacity: 0.12;
    --shadow-color:   #9E2DC0;

    --shadow-2xs: var(--shadow-x) var(--shadow-y) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
    --shadow-xs:  var(--shadow-x) var(--shadow-y) var(--shadow-blur) var(--shadow-spread) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
    --shadow-sm:  var(--shadow-x) var(--shadow-y) calc(var(--shadow-blur) * 1.5) var(--shadow-spread) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
    --shadow-md:  calc(var(--shadow-x) * 2) calc(var(--shadow-y) * 2) calc(var(--shadow-blur) * 3) calc(var(--shadow-spread) - 1px) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
    --shadow-lg:  calc(var(--shadow-x) * 4) calc(var(--shadow-y) * 4) calc(var(--shadow-blur) * 5) calc(var(--shadow-spread) - 3px) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
    --shadow-xl:  calc(var(--shadow-x) * 6) calc(var(--shadow-y) * 6) calc(var(--shadow-blur) * 7) calc(var(--shadow-spread) - 5px) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 100%), transparent);
    --shadow-2xl: calc(var(--shadow-x) * 8) calc(var(--shadow-y) * 8) calc(max(0px, var(--shadow-blur) * 9 - 8px)) calc(var(--shadow-spread) - 12px) color-mix(in srgb, var(--shadow-color) calc(var(--shadow-opacity) * 250%), transparent);
    --shadow:     var(--shadow-md);
  }
}

@layer base {
  * {
    @apply border-border outline-ring/50;
    box-sizing: border-box;
  }
  html {
    height: 100%;
    height: -webkit-fill-available;
  }
  body {
    @apply font-sans antialiased bg-background text-foreground;
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }
}

@layer utilities {
  .scrollbar-none {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .scrollbar-none::-webkit-scrollbar {
    display: none;
  }

  .gradient-bg {
    /* Soft lavender → lilac → blush gradient from brand palette */
    background: linear-gradient(
      135deg,
      hsl(292 25% 93%) 0%,
      hsl(286 30% 90%) 45%,
      hsl(316 40% 93%) 100%
    );
    min-height: 100vh;
    min-height: 100dvh;
  }

  .glass {
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.65);
    box-shadow: 0 8px 32px rgba(158, 45, 192, 0.08);
  }

  /* Deep brand-purple sidebar */
  .glass-dark {
    background: rgba(42, 10, 58, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(195, 130, 214, 0.15);
  }

  /* Safe area padding for notched phones (iOS, Android) */
  .pb-safe {
    padding-bottom: max(1rem, env(safe-area-inset-bottom));
  }

  /* Prevent content jumping when scrollbar appears */
  html {
    scrollbar-gutter: stable;
  }

  /* Smooth momentum scrolling on iOS */
  .overflow-y-auto,
  .overflow-x-auto {
    -webkit-overflow-scrolling: touch;
  }

  .fluid-heading {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: 700;
    line-height: 1.2;
  }

  .fluid-subheading {
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    font-weight: 600;
    line-height: 1.3;
  }
}
  </style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="logo-ico">H</div>
      <div>
        <div style="font-weight:700;color:#fff;font-size:14px;line-height:1.2;">HikeHER</div>
        <div style="font-size:11px;color:rgba(240,230,248,0.5);">Onboarding Dashboard</div>
      </div>
    </div>
    <nav>
      <button class="nav-item" id="nav-dashboard"  onclick="go('dashboard')"></button>
      <button class="nav-item" id="nav-team"        onclick="go('team')"></button>
      <button class="nav-item" id="nav-tools"       onclick="go('tools')"></button>
      <button class="nav-item" id="nav-materials"   onclick="go('materials')"></button>
      <button class="nav-item" id="nav-roles"       onclick="go('roles')"></button>
      <button class="nav-item" id="nav-offboarding" onclick="go('offboarding')"></button>
    </nav>
    <div class="sb-foot">HikeHER © 2025</div>
  </aside>

  <!-- MOBILE HEADER -->
  <div id="mob-hdr">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="logo-ico" style="width:28px;height:28px;font-size:12px;border-radius:8px;">H</div>
      <span style="font-weight:700;font-size:15px;">HikeHER</span>
    </div>
    <button id="mob-menu-btn" onclick="toggleSb()" aria-label="Toggle menu"></button>
  </div>

  <!-- MOBILE OVERLAY -->
  <div id="mob-ov" onclick="closeSb()"></div>

  <!-- MAIN -->
  <main id="main">
    <div id="content" style="display:flex;justify-content:center;padding:80px 20px;">
      <div class="spinner"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-bg" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()"><div id="modal-body"></div></div>
</div>

<!-- WIZARD -->
<div id="wiz-bg" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeWizard()">
  <div class="modal-box" style="max-width:560px;padding:0;overflow:hidden;" onclick="event.stopPropagation()">
    <div id="wiz-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast-el"></div>

<script>
/* ═══════════════════════════════════════
   SVG ICON SYSTEM
═══════════════════════════════════════ */
var SVGP = {
  dashboard:    '<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
  team:         '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  tools:        '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
  materials:    '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  roles:        '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  offboarding:  '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  edit:         '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  trash:        '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  mail:         '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
  menu:         '<line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>',
  close:        '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  plus:         '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  check:        '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
  warning:      '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  refresh:      '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>',
  clipboard:    '<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>',
  'user-plus':  '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="16" y1="11" x2="22" y2="11"/><line x1="19" y1="8" x2="19" y2="14"/>',
  briefcase:    '<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
  palette:      '<circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>',
  code:         '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
  settings:     '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  megaphone:    '<path d="M3 11l19-9-9 19-2-8-8-2z"/>',
  user:         '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  star:         '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  'arrow-right':'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
  'layout':     '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>',
  'search':     '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  'external':   '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'
};

function ic(name, size, extraStyle) {
  size = size || 16;
  var p = SVGP[name] || SVGP.star;
  var st = 'display:inline-block;vertical-align:middle;flex-shrink:0;' + (extraStyle || '');
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="' + st + '">' + p + '</svg>';
}

var NAV_DEFS = [
  { id:'dashboard',   icon:'dashboard',   label:'Dashboard' },
  { id:'team',        icon:'team',        label:'Team' },
  { id:'tools',       icon:'tools',       label:'Tools' },
  { id:'materials',   icon:'materials',   label:'Materials' },
  { id:'roles',       icon:'roles',       label:'Roles' },
  { id:'offboarding', icon:'offboarding', label:'Offboarding' }
];
(function buildNav() {
  NAV_DEFS.forEach(function(n) {
    var sb = document.getElementById('nav-' + n.id);
    if (sb) sb.innerHTML = ic(n.icon, 16) + n.label;
  });
  var mBtn = document.getElementById('mob-menu-btn');
  if (mBtn) mBtn.innerHTML = ic('menu', 20);
})();

/* ═══════════════════════════════════════
   GAS BACKEND
═══════════════════════════════════════ */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxeIWL8yixQvySGsMYupEuet5D0ppEc5e15YUksUc4zjCxTYQYmqwxxSYF0vREnXL1E/exec';

function api(action, payload) {
  var params = new URLSearchParams({ action: action, payload: JSON.stringify(payload || {}) });
  return fetch(GAS_URL + '?' + params.toString(), { method: 'GET', redirect: 'follow' })
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(r) {
      if (r && r.success === false) throw new Error(r.error || 'Server error');
      return (r && r.data !== undefined) ? r.data : r;
    });
}
function loadAll() {
  return Promise.all([api('GET_TEAM'), api('GET_TOOLS'), api('GET_MATERIALS'), api('GET_ROLES')])
    .then(function(r) { S.team=r[0]||[]; S.tools=r[1]||[]; S.materials=r[2]||[]; S.roles=r[3]||[]; });
}

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
var S = {
  page:'dashboard', team:[], tools:[], materials:[],
  roles:[], offboarding:[],
  wiz:{step:1,role:'',name:'',email:'',tools:[],materials:[]},
  offId:'', emailId:'', matFilter:'',
  teamSearch:'', toolSearch:'', matSearch:''
};

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fv(id) { var el=document.getElementById(id); return el?el.value.trim():''; }
function prev(s,n) {
  var a=Array.isArray(s)?s:(s||'').split(',').map(function(x){return x.trim();});
  a=a.filter(Boolean); n=n||2;
  return a.slice(0,n).join(', ')+(a.length>n?' +'+(a.length-n):'');
}
function toArr(s) {
  if(Array.isArray(s)) return s.filter(Boolean);
  return (s||'').split(',').map(function(x){return x.trim();}).filter(Boolean);
}
function catBadge(cat) {
  var m={Communication:'b-blue',Design:'b-purple','Project Management':'b-orange','Social Media':'b-pink',Storage:'b-sky',Other:'b-gray'};
  return '<span class="badge '+(m[cat]||'b-gray')+'">'+esc(cat)+'</span>';
}
function lnkBtn(url,label) {
  return url
    ? '<a href="'+esc(url)+'" target="_blank" rel="noopener" style="color:var(--primary);font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;">'+(label||'Visit')+ic('external',11)+'</a>'
    : '<span style="color:#ccc;font-size:12px;">—</span>';
}
function statusBadge(s) {
  return '<span class="badge '+(s==='Active'?'b-active':'b-inact')+'">'+esc(s)+'</span>';
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.className = 'toast-el ' + (type==='err'?'t-err':'t-ok');
  el.innerHTML = ic(type==='err'?'warning':'check', 15) + '<span>' + esc(msg) + '</span>';
  el.style.display = 'flex';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.display='none'; }, 3000);
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function go(page) {
  if (page !== S.page) { S.teamSearch=''; S.toolSearch=''; S.matSearch=''; }
  S.page = page;
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var n = document.getElementById('nav-' + page); if (n) n.classList.add('active');
  if (window.innerWidth < 768) closeSb();
  var c = document.getElementById('content');
  if      (page==='dashboard')   c.innerHTML = pgDash();
  else if (page==='team')        c.innerHTML = pgTeam();
  else if (page==='tools')       c.innerHTML = pgTools();
  else if (page==='materials')   c.innerHTML = pgMats();
  else if (page==='roles')       c.innerHTML = pgRoles();
  else if (page==='offboarding') c.innerHTML = pgOff();
  window.scrollTo(0, 0);
}

function toggleSb() {
  var sb=document.getElementById('sidebar'), ov=document.getElementById('mob-ov');
  var mBtn = document.getElementById('mob-menu-btn');

function editMember(id) {

function editMat(id){var m=S.materials.find(function(x){return String(x.id)===String(id);});if(!m)return;showModal('Edit Material',matForm(m),function(){var t=fv('mf-t');if(!t){toast('Title required','err');return;}var btn=document.querySelector('#modal-body .btn-p');if(btn){btn.disabled=true;btn.textContent='Saving...';}api('UPDATE_MATERIAL',{id:m.id,title:t,link:fv('mf-l'),role:fv('mf-r')}).then(function(){return api('GET_MATERIALS');}).then(function(mats){S.materials=mats||[];toast('Material updated');closeModal();go('materials');}).catch(function(e){toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Save Changes';}});},'Save Changes');}

function pgRoles() {
  var cards=S.roles.length===0
    ? '<p style="text-align:center;padding:48px;color:var(--muted-fg);">No roles yet.</p>'
    : S.roles.map(function(r){
        return '<div class="glass" style="border-radius:16px;padding:20px;">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'+
            '<div style="display:flex;align-items:center;gap:8px;">'+
              '<div style="width:32px;height:32px;border-radius:8px;background:rgba(158,45,192,0.1);display:flex;align-items:center;justify-content:center;color:var(--primary);">'+ic('roles',16)+'</div>'+
              '<h3 style="font-weight:600;font-size:15px;margin:0;">'+esc(r.name)+'</h3>'+
            '</div>'+
            '<div>'+
              '<button class="btn-icon" onclick="editRole(\''+esc(r.name)+'\')">'+ic('edit',15)+'</button>'+
              '<button class="btn-icon" style="color:var(--error);" onclick="confirmDel(\'role\',\''+esc(r.name)+'\',\''+esc(r.name)+'\')">'+ic('trash',15)+'</button>'+
            '</div>'+
          '</div>'+
          '<p style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-fg);font-weight:600;margin:0 0 6px;">Tools ('+r.defaultTools.length+')</p>'+
          '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;">'+r.defaultTools.map(function(t){return'<span class="badge b-sky">'+esc(t)+'</span>';}).join('')+'</div>'+
          '<p style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-fg);font-weight:600;margin:0 0 6px;">Materials ('+r.defaultMaterials.length+')</p>'+
          '<div style="display:flex;flex-wrap:wrap;gap:4px;">'+r.defaultMaterials.map(function(m){return'<span class="badge b-purple">'+esc(m)+'</span>';}).join('')+'</div>'+
        '</div>';
      }).join('');
  return '<div class="pg-hdr"><div><h1>Role Profiles</h1><p>Define default tool & material assignments per role.</p></div><button class="btn-p pg-btn" onclick="addRole()">'+ic('plus',15)+' New Role</button></div>'+
    '<div class="roles-grid">'+cards+'</div>';
}
function roleForm(r){r=r||{name:'',defaultTools:[],defaultMaterials:[]};var tb=S.tools.map(function(t){var on=r.defaultTools.indexOf(t.name)>=0;return'<button type="button" class="tog-btn'+(on?' on':'')+'" data-sel="'+on+'" data-n="'+esc(t.name)+'" onclick="togB(this,\'on\')">'+esc(t.name)+'</button>';}).join(' ');var mb=S.materials.map(function(m){var on=r.defaultMaterials.indexOf(m.title)>=0;return'<button type="button" class="tog-btn'+(on?' on-v':'')+'" data-sel="'+on+'" data-n="'+esc(m.title)+'" onclick="togB(this,\'on-v\')">'+esc(m.title)+'</button>';}).join(' ');return'<div style="display:grid;gap:14px;"><div><label class="lbl">Role Name *</label><input class="inp" id="rf-n" value="'+esc(r.name)+'"'+(r.name?' disabled style="opacity:.6;"':'')+' ></div><div><label class="lbl">Default Tools <span style="color:var(--muted-fg);font-weight:400;">(click to toggle)</span></label><div id="rf-t" style="display:flex;flex-wrap:wrap;gap:6px;background:rgba(255,255,255,.5);padding:12px;border-radius:10px;min-height:44px;">'+tb+'</div></div><div><label class="lbl">Default Materials</label><div id="rf-m" style="display:flex;flex-wrap:wrap;gap:6px;background:rgba(255,255,255,.5);padding:12px;border-radius:10px;min-height:44px;">'+mb+'</div></div></div>';}
function togB(btn,cls){var on=btn.dataset.sel==='true';btn.dataset.sel=String(!on);btn.classList.toggle(cls,!on);}
function getRFD(){var t=[],m=[];document.querySelectorAll('#rf-t .tog-btn').forEach(function(b){if(b.dataset.sel==='true')t.push(b.dataset.n);});document.querySelectorAll('#rf-m .tog-btn').forEach(function(b){if(b.dataset.sel==='true')m.push(b.dataset.n);});return{name:fv('rf-n'),tools:t,mats:m};}
function addRole(){showModal('New Role',roleForm(),function(){var d=getRFD();if(!d.name){toast('Role name required','err');return;}if(S.roles.find(function(r){return r.name===d.name;})){toast('Role already exists','err');return;}var btn=document.querySelector('#modal-body .btn-p');if(btn){btn.disabled=true;btn.textContent='Creating...';}api('SAVE_ROLE',{role:d.name,tools:d.tools,materials:d.mats}).then(function(){return api('GET_ROLES');}).then(function(roles){S.roles=roles||[];toast('Role created');closeModal();go('roles');}).catch(function(e){toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Create Role';}});},'Create Role');}
function editRole(name){var r=S.roles.find(function(x){return x.name===name;});if(!r)return;showModal('Edit Role: '+name,roleForm(r),function(){var d=getRFD();var btn=document.querySelector('#modal-body .btn-p');if(btn){btn.disabled=true;btn.textContent='Saving...';}api('SAVE_ROLE',{role:name,tools:d.tools,materials:d.mats}).then(function(){return api('GET_ROLES');}).then(function(roles){S.roles=roles||[];toast('Role updated');closeModal();go('roles');}).catch(function(e){toast(e.message,'err');if(btn){btn.disabled=false;btn.textContent='Save Changes';}});},'Save Changes');}

/* ═══════════════════════════════════════
   OFFBOARDING
═══════════════════════════════════════ */
function pgOff() {
  var mo='<option value="">Choose a team member...</option>'+
    S.team.map(function(m){return'<option value="'+m.id+'"'+(String(m.id)===String(S.offId)?' selected':'')+'>'+esc(m.name)+' — '+esc(m.role)+'</option>';}).join('');
  var detail='';
  if(S.offId){
    var items=S.offboarding;
    var mem=S.team.find(function(m){return String(m.id)===String(S.offId);});
    var done=items.filter(function(i){return i.status==='Done';}).length;
    var prog=items.length?Math.round((done/items.length)*100):0;
    var chks=items.map(function(it){
      var d=it.status==='Done';
      return'<div class="chk-item'+(d?' done':'')+'" onclick="togChk(\''+it.id+'\',\''+it.status+'\')">'+
        '<input type="checkbox"'+(d?' checked':'')+' onclick="event.stopPropagation();togChk(\''+it.id+'\',\''+it.status+'\')" style="width:18px;height:18px;cursor:pointer;accent-color:var(--primary);">'+
        '<span style="flex:1;font-size:14px;font-weight:500;'+(d?'text-decoration:line-through;color:var(--muted-fg);':'')+'">'+esc(it.checklistItem)+'</span>'+
        (d&&it.dateCompleted?'<span style="font-size:11px;color:var(--muted-fg);">'+esc(it.dateCompleted)+'</span>':'')+
        (d?'<span style="color:var(--primary);display:flex;">'+ic('check',16)+'</span>':'')+
      '</div>';
    }).join('');
    detail='<div class="glass" style="border-radius:16px;padding:24px;margin-top:16px;">'+
      (mem?'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;"><div><p style="font-weight:600;font-size:16px;margin:0 0 3px;">'+esc(mem.name)+'</p><p style="color:var(--text2);font-size:13px;margin:0;">'+esc(mem.role)+' · '+esc(mem.email)+'</p></div><span class="badge '+(prog===100?'b-active':'b-sec')+'">'+(prog===100?'Complete':'In Progress')+'</span></div>':'')+
      '<div style="margin-bottom:18px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;"><span style="color:var(--text2);">Progress</span><span style="font-weight:600;">'+done+'/'+items.length+' tools</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+prog+'%;"></div></div></div>'+
      (items.length===0?'<p style="text-align:center;padding:24px;color:var(--muted-fg);">No tools assigned to this member.</p>':
        '<p style="font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-fg);font-weight:600;margin:0 0 10px;">Tools to Deactivate</p>'+chks)+
      (prog===100&&items.length>0?'<div style="text-align:center;padding:16px;background:rgba(158,45,192,.08);border-radius:12px;margin-top:12px;"><div style="color:var(--primary);display:flex;justify-content:center;margin-bottom:6px;">'+ic('check',32)+'</div><p style="font-weight:600;color:var(--primary);margin:0;">All tools deactivated!</p></div>':'')+
    '</div>';
  }
  return '<div class="pg-hdr"><div><h1>Offboarding Checklist</h1><p>Track tool deactivation when a team member leaves.</p></div></div>'+
    '<div style="max-width:min(580px,100%);">'+
      '<div class="glass" style="border-radius:16px;padding:20px;">'+
        '<label class="lbl">Select Team Member to Offboard</label>'+
        '<select class="inp" onchange="loadOff(this.value)">'+mo+'</select>'+
      '</div>'+detail+
    '</div>';
}
function loadOff(id){S.offId=id;S.offboarding=[];if(!id){go('offboarding');return;}document.getElementById('content').innerHTML='<div style="padding:80px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div></div>';api('INIT_OFFBOARDING',{memberId:id}).then(function(data){S.offboarding=(data&&data.items)?data.items:[];go('offboarding');}).catch(function(e){toast(e.message,'err');S.offId='';go('offboarding');});}
function togChk(id,cur){var ns=cur==='Done'?'Pending':'Done';api('UPDATE_CHECKLIST',{id:id,status:ns}).then(function(){return api('GET_OFFBOARDING',{memberId:S.offId});}).then(function(data){S.offboarding=(data&&data.items)?data.items:[];if(ns==='Done')toast('Tool deactivated');go('offboarding');}).catch(function(e){toast(e.message,'err');});}

/* ═══════════════════════════════════════
   WIZARD
═══════════════════════════════════════ */
var RICO={Manager:'briefcase',Designer:'palette',Developer:'code',Operations:'settings',Marketing:'megaphone',HR:'user'};
function openWizard(){S.wiz={step:1,role:'',name:'',email:'',tools:[],materials:[]};renderWiz();document.getElementById('wiz-bg').style.display='flex';}
function closeWizard(){document.getElementById('wiz-bg').style.display='none';}
function renderWiz(){
  var w=S.wiz,prog=(w.step/3)*100;
  var steps=['Role','Setup','Done'].map(function(s,i){var n=i+1,on=w.step>=n;return'<div style="display:flex;align-items:center;gap:5px;"><div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:'+(on?'var(--primary)':'#e8d5ec')+';color:'+(on?'#fff':'var(--muted-fg)')+';">'+n+'</div><span style="font-size:12px;color:var(--muted-fg);">'+s+'</span>'+(n<3?'<div style="width:16px;height:1px;background:#e8d5ec;margin:0 3px;"></div>':'')+'</div>';}).join('');
  var body=w.step===1?wizS1():w.step===2?wizS2():wizS3();
  var foot='';
  if(w.step===1){foot='<div style="display:flex;gap:10px;padding:0 20px 20px;"><button class="btn-s" style="flex:1;" onclick="closeWizard()">Cancel</button><button id="wiz-next" class="btn-p" style="flex:2;" onclick="wizNext()">Continue '+ic('arrow-right',14)+'</button></div>';}
  else if(w.step===2){foot='<div style="display:flex;gap:10px;padding:0 20px 20px;flex-wrap:wrap;"><button class="btn-s" style="flex:1;min-width:80px;" onclick="wizBack()">Back</button><button id="wiz-next" class="btn-p" style="flex:2;min-width:120px;" onclick="wizNext()">Add Member</button><div style="width:100%;text-align:center;padding-top:4px;"><button onclick="closeWizard()" style="background:none;border:none;color:var(--muted-fg);font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;">Cancel</button></div></div>';}
  document.getElementById('wiz-body').innerHTML=
    '<div style="height:3px;background:#e8d5ec;"><div style="height:3px;background:var(--primary);width:'+prog+'%;transition:width .3s;"></div></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px 4px;">'+
      '<div style="display:flex;align-items:center;gap:6px;">'+steps+'</div>'+
      '<button onclick="closeWizard()" style="background:none;border:none;cursor:pointer;color:var(--muted-fg);padding:4px;min-width:34px;min-height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;">'+ic('close',18)+'</button>'+
    '</div>'+
    '<div id="wiz-err" style="display:none;margin:0 20px 8px;padding:10px 14px;background:#fff0f0;border:1px solid #f5c0c0;border-radius:8px;font-size:13px;color:var(--error);align-items:center;gap:6px;">'+ic('warning',14)+'<span id="wiz-err-txt"></span></div>'+
    '<div style="padding:4px 20px 12px;">'+body+'</div>'+foot;
}
function wizS1(){var ar=S.roles.length>0?S.roles.map(function(r){return r.name;}):['Manager','Designer','Developer','Operations','Marketing','HR'];return'<div style="text-align:center;margin-bottom:16px;"><h2 style="font-size:1.15rem;font-weight:700;margin:0 0 6px;">Welcome to HikeHER</h2><p style="color:var(--text2);font-size:14px;margin:0;">Select the role for this team member.</p></div><div class="wiz-role-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">'+ar.map(function(nm){var icoKey=RICO[nm]||'star';return'<div class="role-card'+(S.wiz.role===nm?' sel':'')+'" onclick="selRole(\''+esc(nm)+'\')"><div class="rc-ico">'+ic(icoKey,20)+'</div><div style="font-size:12px;font-weight:600;">'+esc(nm)+'</div></div>';}).join('')+'</div>';}
function selRole(role){S.wiz.role=role;var def=S.roles.find(function(r){return r.name===role;});S.wiz.tools=def?def.defaultTools.slice():[];S.wiz.materials=def?def.defaultMaterials.slice():[];renderWiz();}
function wizS2(){var tt=S.wiz.tools.map(function(t){return'<span class="tag">'+esc(t)+' <button class="tag-x" onclick="rmWT(\''+esc(t)+'\')">'+ic('close',10)+'</button></span>';}).join('');var mt=S.wiz.materials.map(function(m){return'<span class="tag">'+esc(m)+' <button class="tag-x" onclick="rmWM(\''+esc(m)+'\')">'+ic('close',10)+'</button></span>';}).join('');return'<div style="text-align:center;margin-bottom:16px;"><h2 style="font-size:1.15rem;font-weight:700;margin:0 0 6px;">Workspace Setup</h2><p style="color:var(--text2);font-size:14px;margin:0;">Enter member details and review assignments.</p></div><div style="display:grid;gap:12px;"><div><label class="lbl">Full Name *</label><input class="inp" id="wn" placeholder="Jane Doe" value="'+esc(S.wiz.name)+'" oninput="S.wiz.name=this.value"></div><div><label class="lbl">Email *</label><input class="inp" id="we" type="email" placeholder="jane@hikeher.com" value="'+esc(S.wiz.email)+'" oninput="S.wiz.email=this.value"></div><div><label class="lbl">Assigned Tools</label><div style="background:rgba(255,255,255,.5);padding:10px;border-radius:10px;min-height:44px;display:flex;flex-wrap:wrap;gap:5px;">'+(tt||'<span style="color:var(--muted-fg);font-size:13px;">No tools</span>')+'</div></div><div><label class="lbl">Training Materials</label><div style="background:rgba(255,255,255,.5);padding:10px;border-radius:10px;min-height:44px;display:flex;flex-wrap:wrap;gap:5px;">'+(mt||'<span style="color:var(--muted-fg);font-size:13px;">No materials</span>')+'</div></div></div>';}
function savWiz(){if(document.getElementById('wn'))S.wiz.name=document.getElementById('wn').value;if(document.getElementById('we'))S.wiz.email=document.getElementById('we').value;}
function rmWT(t){savWiz();S.wiz.tools=S.wiz.tools.filter(function(x){return x!==t;});renderWiz();}
function rmWM(m){savWiz();S.wiz.materials=S.wiz.materials.filter(function(x){return x!==m;});renderWiz();}
function wizS3(){return'<div style="text-align:center;padding:16px 0;"><div class="success-circle">'+ic('check',36)+'</div><h2 style="font-size:1.15rem;font-weight:700;margin:0 0 8px;">You\'re all set!</h2><p style="color:var(--text2);font-size:14px;margin:0 0 22px;"><strong>'+esc(S.wiz.name)+'</strong> added as <strong>'+esc(S.wiz.role)+'</strong>.</p><div style="display:flex;flex-direction:column;gap:10px;max-width:240px;margin:0 auto;"><button class="btn-p" style="width:100%;justify-content:center;" onclick="emailFromWiz()">'+ic('mail',15)+' Generate Onboarding Email</button><button class="btn-s" style="width:100%;justify-content:center;" onclick="closeWizard();go(\'dashboard\');">'+ic('layout',15)+' Go to Dashboard</button></div></div>';}
function emailFromWiz(){var last=S.team.length>0?S.team[S.team.length-1]:null;closeWizard();if(last)openEmailModal(String(last.id));}
function wizErr(msg){var el=document.getElementById('wiz-err');var txt=document.getElementById('wiz-err-txt');if(el)el.style.display='flex';if(txt)txt.textContent=msg;toast(msg,'err');}
function wizClearErr(){var el=document.getElementById('wiz-err');if(el)el.style.display='none';}
function wizNext(){var w=S.wiz;wizClearErr();if(w.step===1){if(!w.role){wizErr('Please select a role to continue.');return;}w.step=2;renderWiz();}else if(w.step===2){savWiz();if(!w.name.trim()){wizErr('Full name is required.');return;}if(!w.email.trim()){wizErr('Email address is required.');return;}var btn=document.getElementById('wiz-next');if(btn){btn.disabled=true;btn.textContent='Adding...';}api('ADD_MEMBER',{name:w.name,email:w.email,role:w.role,tools:w.tools.join(','),materials:w.materials.join(',')}).then(function(){return api('GET_TEAM');}).then(function(team){S.team=team||[];w.step=3;renderWiz();}).catch(function(e){wizErr(e.message||'Could not add member.');if(btn){btn.disabled=false;btn.textContent='Add Member';}});}}
function wizBack(){wizClearErr();S.wiz.step--;renderWiz();}

/* ═══════════════════════════════════════
   EMAIL GENERATOR
═══════════════════════════════════════ */
function openEmailModal(id){
  S.emailId=String(id);
  var mo=S.team.map(function(m){return'<option value="'+m.id+'"'+(String(m.id)===S.emailId?' selected':'')+'>'+esc(m.name)+' — '+esc(m.role)+'</option>';}).join('');
  showModal('Generate Onboarding Email',
    '<div style="display:grid;gap:14px;">'+
      '<div><label class="lbl">Team Member</label><select class="inp" id="em-sel" onchange="refreshEmail()">'+mo+'</select></div>'+
      '<div id="em-area" style="min-height:140px;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>'+
    '</div>',
    function(){var ta=document.getElementById('em-txt');if(!ta){toast('No email to copy','err');return;}try{navigator.clipboard.writeText(ta.value).then(function(){toast('Email copied to clipboard');});}catch(ex){ta.select();document.execCommand('copy');toast('Copied!');}},
    ic('clipboard',14)+' Copy Email');
  setTimeout(refreshEmail,100);
}
function refreshEmail(){
  var sel=document.getElementById('em-sel');if(!sel)return;
  S.emailId=sel.value;
  var area=document.getElementById('em-area');if(!area)return;
  var mem=S.team.find(function(m){return String(m.id)===S.emailId;});
  if(!mem){area.innerHTML='<p style="color:var(--muted-fg);font-size:13px;text-align:center;padding:24px;">Select a member to preview.</p>';return;}
  var tools=toArr(mem.tools),mats=toArr(mem.materials);
  var tLinks={};S.tools.forEach(function(t){tLinks[t.name]=t.link;});
  var tl=tools.map(function(t){return'  • '+t+(tLinks[t]?' — '+tLinks[t]:'');}).join('\n');
  var ml=mats.map(function(m){return'  • '+m;}).join('\n');
  var txt='Hello '+mem.name+',\n\nWelcome to the HikeHER team as our '+mem.role+'!\n\nWe\'re thrilled to have you on board. Here\'s everything you need to get started:\n\nYour Tools:\n'+(tl||'  (No tools assigned)')+'\n\nTraining Materials:\n'+(ml||'  (No materials assigned)')+'\n\nPlease take some time to familiarise yourself with the above resources. If you have any questions, don\'t hesitate to reach out.\n\nLooking forward to working with you!\n\nBest regards,\nThe HikeHER Operations Team\nhello@hikeher.com';
  area.innerHTML='<textarea id="em-txt" readonly class="inp" style="height:220px;font-family:monospace;font-size:12px;line-height:1.6;resize:none;">'+esc(txt)+'</textarea>';
}

/* ═══════════════════════════════════════
   DELETE CONFIRM
═══════════════════════════════════════ */
function confirmDel(type,id,name){
  showModal('Confirm Delete',
    '<p style="margin:0 0 6px;">Delete <strong>'+esc(name)+'</strong>?</p>'+
    '<p style="color:var(--muted-fg);font-size:13px;margin:0;">This action cannot be undone.</p>',
    function(){
      var am={team:'DELETE_MEMBER',tool:'DELETE_TOOL',material:'DELETE_MATERIAL',role:'DELETE_ROLE'};
      var rm={team:'GET_TEAM',tool:'GET_TOOLS',material:'GET_MATERIALS',role:'GET_ROLES'};
      var action=am[type];if(!action)return;
      var payload=type==='role'?{role:id}:{id:id};
      var btn=document.querySelector('#modal-body .btn-d');
      if(btn){btn.disabled=true;btn.textContent='Deleting...';}
      api(action,payload).then(function(){return api(rm[type]);}).then(function(data){
        if(type==='team')S.team=data||[];
        if(type==='tool')S.tools=data||[];
        if(type==='material')S.materials=data||[];
        if(type==='role')S.roles=data||[];
        toast('Deleted');closeModal();go(S.page);
      }).catch(function(e){toast(e.message,'err');if(btn){btn.disabled=false;btn.innerHTML=ic('trash',14)+' Delete';}});
    },ic('trash',14)+' Delete',true);
}

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
var _cb=null;
function showModal(title,body,onOk,okLabel,danger){
  _cb=onOk;
  document.getElementById('modal-body').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">'+
      '<h2 style="font-size:1.05rem;font-weight:700;margin:0;">'+esc(title)+'</h2>'+
      '<button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:var(--muted-fg);padding:4px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;">'+ic('close',18)+'</button>'+
    '</div>'+
    '<div style="margin-bottom:20px;">'+body+'</div>'+
    '<div style="display:flex;gap:12px;">'+
      '<button class="btn-s" style="flex:1;" onclick="closeModal()">Cancel</button>'+
      '<button class="'+(danger?'btn-d':'btn-p')+'" style="flex:1;justify-content:center;" onclick="_cb&&_cb()">'+((typeof okLabel==='string'&&okLabel.includes('<svg'))?okLabel:esc(okLabel||'Save'))+'</button>'+
    '</div>';
  document.getElementById('modal-bg').style.display='flex';
}
function closeModal(){document.getElementById('modal-bg').style.display='none';_cb=null;}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
window.onload = function() {
  loadAll()
    .then(function() { go('dashboard'); })
    .catch(function(e) {
      document.getElementById('content').innerHTML=
        '<div style="padding:60px 20px;text-align:center;">'+
          '<div style="color:var(--error);display:flex;justify-content:center;margin-bottom:16px;">'+ic('warning',48)+'</div>'+
          '<h2 style="color:var(--error);margin:0 0 8px;">Connection Error</h2>'+
          '<p style="color:var(--text2);margin:0 0 16px;">Could not connect to the GAS backend.<br>Make sure the deployment is set to <strong>Anyone</strong>.</p>'+
          '<p style="font-size:12px;color:var(--muted-fg);font-family:monospace;word-break:break-all;">'+esc(String(e.message))+'</p>'+
          '<button class="btn-p" onclick="window.location.reload()" style="margin-top:20px;">'+ic('refresh',15)+' Retry</button>'+
        '</div>';
    });
};
</script>
